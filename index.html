<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Calculator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (for icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display-section">
                <input type="text" id="display" class="display" placeholder="0" readonly>
                <small id="previous-operand" class="previous-operand"></small>
            </div>

            <div class="buttons-grid">
                <!-- Row 1: Functions -->
                <button class="btn btn-function" onclick="calculator.clear()">AC</button>
                <button class="btn btn-function" onclick="calculator.delete()">DEL</button>
                <button class="btn btn-function" onclick="calculator.append('%')">%</button>
                <button class="btn btn-operator" onclick="calculator.chooseOperation('÷')">÷</button>

                <!-- Row 2 -->
                <button class="btn btn-number" onclick="calculator.append('7')">7</button>
                <button class="btn btn-number" onclick="calculator.append('8')">8</button>
                <button class="btn btn-number" onclick="calculator.append('9')">9</button>
                <button class="btn btn-operator" onclick="calculator.chooseOperation('×')">×</button>

                <!-- Row 3 -->
                <button class="btn btn-number" onclick="calculator.append('4')">4</button>
                <button class="btn btn-number" onclick="calculator.append('5')">5</button>
                <button class="btn btn-number" onclick="calculator.append('6')">6</button>
                <button class="btn btn-operator" onclick="calculator.chooseOperation('-')">-</button>

                <!-- Row 4 -->
                <button class="btn btn-number" onclick="calculator.append('1')">1</button>
                <button class="btn btn-number" onclick="calculator.append('2')">2</button>
                <button class="btn btn-number" onclick="calculator.append('3')">3</button>
                <button class="btn btn-operator" onclick="calculator.chooseOperation('+')">+</button>

                <!-- Row 5 -->
                <button class="btn btn-number btn-zero" onclick="calculator.append('0')">0</button>
                <button class="btn btn-number" onclick="calculator.append('.')">.</button>
                <button class="btn btn-equals" onclick="calculator.compute()">=</button>

                <!-- Row 6: Advanced Functions -->
                <button class="btn btn-function-advanced" onclick="calculator.square()" title="Square">x²</button>
                <button class="btn btn-function-advanced" onclick="calculator.squareRoot()" title="Square Root">√</button>
                <button class="btn btn-function-advanced" onclick="calculator.reciprocal()" title="1/x">1/x</button>
                <button class="btn btn-function-advanced" onclick="calculator.toggleSign()" title="Toggle Sign">+/-</button>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="style.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS Bundle (includes Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
